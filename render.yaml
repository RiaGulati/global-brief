services:
  - type: web
    name: global-brief
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    disk:
      name: db
      mountPath: /app
      sizeGB: 1
